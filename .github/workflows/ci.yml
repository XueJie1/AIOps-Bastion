name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 设计要求 3.11+, spike 实测 3.14 亦可

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: ruff check src tests

      - name: Mypy (type check)
        run: mypy src tests
        continue-on-error: true    # M1 阶段类型标注未完备, 暂不阻塞 CI

      - name: Pytest
        run: pytest tests/ -v --cov=aiops_bastion --cov-report=term-missing
